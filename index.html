<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付け回し管理ボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f5f5;color:#222;font-size:14px}
.shop-tabs{display:flex;gap:4px;padding:10px 12px 0;background:#222;border-bottom:2px solid #444}
.shop-tab{padding:8px 20px;cursor:pointer;border-radius:6px 6px 0 0;color:#aaa;background:transparent;border:none;font-size:14px}
.shop-tab.active{background:#f5f5f5;color:#222;font-weight:600}
.inner-tabs{display:flex;gap:4px;padding:8px 12px 0;background:#fff;border-bottom:1px solid #ddd;flex-wrap:wrap}
.inner-tab{padding:6px 16px;cursor:pointer;border-radius:6px 6px 0 0;color:#888;background:transparent;border:1px solid transparent;font-size:13px}
.inner-tab.active{border-color:#ddd;border-bottom:1px solid #fff;color:#222;font-weight:500;background:#fff}
.panel{display:none;padding:12px}
.panel.active{display:block}
.btn{padding:5px 12px;font-size:12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;color:#222}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#e1f5ee;color:#0f6e56;border-color:#5dcaa5}
.btn.danger{background:#ffeaea;color:#a32d2d;border-color:#f09595}
.btn.warn{background:#faeeda;color:#854f0b;border-color:#ef9f27}
.btn.info{background:#e6f1fb;color:#185fa5;border-color:#85b7eb}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;position:relative}
.card.active-staff{border-color:#5dcaa5;background:#e1f5ee}
.card-name{font-size:13px;font-weight:500}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.badge.free{background:#e1f5ee;color:#0f6e56}
.badge.busy{background:#faeeda;color:#854f0b}
.badge.off{background:#f0f0f0;color:#888}
.course-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;margin-bottom:8px}
.course-card.done-card{opacity:0.5}
.course-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;cursor:pointer;user-select:none}
.course-num{font-size:16px;font-weight:700;min-width:24px}
.summary-chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.summary-chip{background:#f0f0f0;border-radius:20px;padding:2px 8px;font-size:11px;color:#444}
.summary-chip.memo{background:#fff8e6}
.compact-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.memo-row{display:flex;gap:6px;margin-bottom:8px}
.memo-input{flex:1;font-size:12px;padding:5px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#222;font-family:sans-serif}
.half-block{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.half-block.single{grid-template-columns:1fr}
.half{background:#f9f9f9;border:1px solid #eee;border-radius:8px;padding:8px}
.half.ext-half{background:#fff8e6;border-color:#f0c060}
.half-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.half-time{font-size:11px;color:#185fa5;margin-bottom:4px}
.half-girls{display:flex;flex-wrap:wrap;gap:4px;min-height:22px}
.girl-chip{display:flex;align-items:center;gap:3px;background:#fff;border:1px solid #ddd;border-radius:20px;padding:2px 7px;font-size:12px}
.girl-chip .remove{cursor:pointer;color:#aaa;font-size:10px}
.girl-chip .remove:hover{color:#a32d2d}
.timeline{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.tl-item{padding:3px 9px;border-radius:20px;font-size:12px;border:1px solid #ddd;background:#f9f9f9}
.tl-item.done{background:#ffeaea;border-color:#f09595;color:#a32d2d;font-weight:500}
.tl-item.soon{background:#faeeda;border-color:#ef9f27;color:#854f0b;font-weight:500}
.copy-btn{padding:2px 8px;font-size:11px;border:1px solid #c4b5fd;border-radius:20px;cursor:pointer;background:#f5f0ff;color:#5b21b6}
.copy-btn:hover{background:#ede9fe}
.copy-btn.copied{background:#e1f5ee;color:#0f6e56;border-color:#5dcaa5}
.ext-block{border:1px solid #f0c060;border-radius:8px;padding:8px;margin-bottom:8px;background:#fffdf5}
.ext-block-label{font-size:11px;color:#854f0b;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;cursor:pointer;user-select:none}
.ext-block-body.collapsed{display:none}
.status-table{width:100%;border-collapse:collapse}
.status-table th{text-align:left;font-size:12px;color:#888;font-weight:500;padding:5px 7px;border-bottom:1px solid #eee}
.status-table td{padding:7px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:middle}
.status-table tr:last-child td{border-bottom:none}
.overlap-badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:11px;background:#ffeaea;color:#a32d2d;border:1px solid #f09595;margin-left:4px}
.count-badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;background:#e6f1fb;color:#185fa5;border:1px solid #85b7eb;margin-left:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:18px;width:300px;max-width:92vw;max-height:80vh;overflow-y:auto}
.modal h4{font-size:14px;font-weight:600;margin-bottom:12px}
.modal label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:8px}
.modal input,.modal select,.modal textarea{width:100%;font-size:13px;padding:6px 9px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#222}
.modal textarea{height:120px;resize:vertical;font-family:sans-serif}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.girl-check-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;border:1px solid #eee;border-radius:6px;padding:7px}
.girl-check-item{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer}
.girl-check-item input{width:15px;height:15px;cursor:pointer}
.empty{text-align:center;padding:30px;color:#aaa;font-size:13px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.free{background:#1d9e75}
.dot.busy{background:#ef9f27}
.shift-result{margin-top:10px;font-size:12px;color:#0f6e56;background:#e1f5ee;border-radius:6px;padding:8px}
.shift-error{margin-top:10px;font-size:12px;color:#a32d2d;background:#ffeaea;border-radius:6px;padding:8px}
.link-row{display:flex;align-items:center;gap:8px;margin:8px 0;padding:6px 8px;background:#f5f0ff;border-radius:6px;font-size:12px;color:#5b21b6}
.divider{height:1px;background:#eee;margin:10px 0}
.toggle-done-btn{font-size:11px;padding:3px 10px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;color:#888}
.toggle-done-btn.active{background:#f0f0f0;color:#222;border-color:#bbb}
#copyModal{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:center;justify-content:center}
#copyModal.open{display:flex}
#copyModalBox{background:#fff;border-radius:12px;padding:18px;width:280px;max-width:92vw}
#copyModalText{width:100%;font-size:14px;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:12px;resize:none;height:70px}
.chevron{font-size:10px;margin-left:4px}
.drink-counter{display:flex;gap:10px;padding:12px 0;overflow-x:auto}
.drink-item{flex:1;min-width:70px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 6px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.drink-item-back{font-size:18px;font-weight:700;color:#222}
.drink-item-price{font-size:10px;color:#aaa}
.drink-item-label{font-size:11px;color:#888}
.drink-tally{font-size:20px;letter-spacing:1px;min-height:28px;line-height:1.2;color:#222;font-family:serif}
.drink-count-num{font-size:13px;font-weight:600;color:#185fa5}
.drink-tap-btn{width:52px;height:52px;border-radius:50%;border:2px solid #ddd;background:#f9f9f9;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
.drink-tap-btn:active{background:#e1f5ee;border-color:#5dcaa5}
.drink-undo-btn{font-size:10px;padding:2px 8px;border:1px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;color:#888;margin-top:2px}
.drink-undo-btn:hover{background:#ffeaea;color:#a32d2d}
.drink-total-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding:10px;background:#f9f9f9;border-radius:8px;align-items:center}
.drink-total-item{font-size:12px;color:#444}
.drink-total-item span{font-weight:600;color:#185fa5}
.drink-reset-btn{font-size:11px;padding:3px 10px;border:1px solid #f09595;border-radius:20px;cursor:pointer;background:#ffeaea;color:#a32d2d;margin-left:auto}
</style>
</head>
<body>

<div class="shop-tabs">
  <button class="shop-tab active" onclick="switchShop(0)" id="shopTab0">ANUBIS</button>
  <button class="shop-tab" onclick="switchShop(1)" id="shopTab1">BASTET</button>
</div>
<div id="shopPanel0"></div>
<div id="shopPanel1" style="display:none"></div>

<div id="copyModal">
  <div id="copyModalBox">
    <div style="font-size:13px;color:#666;margin-bottom:8px">以下のテキストをコピーしてください</div>
    <textarea id="copyModalText" readonly></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('copyModal').classList.remove('open')">閉じる</button>
      <button class="btn primary" onclick="selectCopyText()">全選択</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAddStaff">
  <div class="modal">
    <h4>スタッフ追加</h4>
    <label>名前</label>
    <input id="inputStaffName" type="text" placeholder="名前を入力" />
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalAddStaff')">キャンセル</button>
      <button class="btn primary" onclick="confirmAddStaff()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalShiftImport">
  <div class="modal">
    <h4>シフト読み込み</h4>
    <label>LINEのシフトをそのまま貼り付け</label>
    <textarea id="inputShiftText" placeholder="5/20(水)&#10;ねる      20.5-&#10;はなの  20-&#10;はる      21-"></textarea>
    <div id="shiftResult"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalShiftImport')">キャンセル</button>
      <button class="btn primary" onclick="confirmShiftImport()">読み込む</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAddCourse">
  <div class="modal">
    <h4>コース追加</h4>
    <label>コース種別</label>
    <select id="inputCourseType">
      <option value="40">40分コース</option>
      <option value="60">60分コース</option>
    </select>
    <label>スタート時間</label>
    <input id="inputCourseStart" type="time" />
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalAddCourse')">キャンセル</button>
      <button class="btn primary" onclick="confirmAddCourse()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAssign">
  <div class="modal">
    <h4 id="modalAssignTitle">女の子をアサイン</h4>
    <div id="girlCheckList" class="girl-check-list"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalAssign')">キャンセル</button>
      <button class="btn primary" onclick="confirmAssign()">セット</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalExtend">
  <div class="modal">
    <h4>延長</h4>
    <label>延長時間</label>
    <select id="inputExtend"></select>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalExtend')">キャンセル</button>
      <button class="btn primary" onclick="confirmExtend()">延長</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalEditTime">
  <div class="modal">
    <h4>時間編集</h4>
    <label>前半 開始</label>
    <input id="inputFirstStart" type="time" />
    <label>前半 終了</label>
    <input id="inputFirstEnd" type="time" />
    <div class="divider"></div>
    <label>後半 開始</label>
    <input id="inputSecondStart" type="time" />
    <label>後半 終了</label>
    <input id="inputSecondEnd" type="time" />
    <div class="link-row">
      <input type="checkbox" id="linkHalves" style="width:15px;height:15px">
      <label for="linkHalves" style="margin:0;color:#5b21b6;cursor:pointer">前半終了を後半開始に連動</label>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modalEditTime')">キャンセル</button>
      <button class="btn primary" onclick="confirmEditTime()">更新</button>
    </div>
  </div>
</div>

<script>
const shops=[
  {name:'ANUBIS',extOptions:[20,40],staff:[],courses:[],innerTab:0,showDone:false},
  {name:'BASTET',extOptions:[30,60],staff:[],courses:[],innerTab:0,showDone:false}
];
const drinkCount={s:0,m:0,l:0,jonai:0};
let currentShop=0;
let pendingShop=null,pendingCourseIdx=null,pendingHalf=null,pendingExtCourse=null,pendingEditCourse=null,pendingExtBlock=null;
const extCollapsed={};
const courseCollapsed={};

function save(){
  localStorage.setItem('gbv5',JSON.stringify(shops.map(s=>({name:s.name,extOptions:s.extOptions,staff:s.staff,courses:s.courses,innerTab:s.innerTab||0,showDone:s.showDone||false}))));
  localStorage.setItem('gbDrink',JSON.stringify(drinkCount));
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('gbv5'));
    if(d){d.forEach((s,i)=>{shops[i].staff=s.staff||[];shops[i].courses=s.courses||[];shops[i].innerTab=s.innerTab||0;shops[i].showDone=s.showDone||false;});}
    const dc=JSON.parse(localStorage.getItem('gbDrink'));
    if(dc)Object.assign(drinkCount,dc);
  }catch(e){}
}

function pad(n){return String(n).padStart(2,'0')}
function toMins(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function toTime(m){return pad(Math.floor(((m%1440)+1440)%1440/60))+':'+pad(((m%1440)+1440)%1440%60)}
function getMinPart(t){return pad(toMins(t)%60)}
function nowStr(){const n=new Date();return pad(n.getHours())+':'+pad(n.getMinutes())}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes()}
function tlClass(t){const diff=toMins(t)-nowMins();if(diff<=0)return'done';if(diff<=5)return'soon';return''}

function sortedStaff(staff){
  return [...staff].sort((a,b)=>{
    const as=toMins(a.shiftStart||'99:99'),bs=toMins(b.shiftStart||'99:99');
    if(as!==bs)return as-bs;
    return toMins(a.shiftEnd||'99:99')-toMins(b.shiftEnd||'99:99');
  });
}

function showCopyModal(text){
  document.getElementById('copyModalText').value=text;
  document.getElementById('copyModal').classList.add('open');
  setTimeout(()=>selectCopyText(),100);
}
function selectCopyText(){
  const ta=document.getElementById('copyModalText');
  ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
}

function shiftTimeToHHMM(t){
  t=String(t).trim();
  if(t.includes('.')){const[h,d]=t.split('.');return pad(parseInt(h))+':'+(d==='5'?'30':'00');}
  return pad(parseInt(t))+':00';
}
function parseShift(text){
  const lines=text.split('\n'),results=[],errors=[];
  for(let line of lines){
    line=line.trim();
    if(!line||/^\d+\//.test(line))continue;
    const match=line.match(/^(.+?)\s{2,}(.+)$/)||line.match(/^(.+?)\s+(\d[\d.].*)$/);
    if(!match){errors.push(line);continue;}
    const tMatch=match[2].trim().match(/^([\d.]+)(?:-([\d.]+)?)?$/);
    if(!tMatch){errors.push(line);continue;}
    results.push({name:match[1].trim(),start:shiftTimeToHHMM(tMatch[1]),end:tMatch[2]?shiftTimeToHHMM(tMatch[2]):null});
  }
  return{results,errors};
}
function confirmShiftImport(){
  const{results,errors}=parseShift(document.getElementById('inputShiftText').value);
  const shop=shops[currentShop];
  results.forEach(r=>{
    const ex=shop.staff.find(s=>s.name===r.name);
    if(ex){ex.working=true;ex.shiftStart=r.start;ex.shiftEnd=r.end;}
    else shop.staff.push({name:r.name,working:true,shiftStart:r.start,shiftEnd:r.end});
  });
  document.getElementById('shiftResult').innerHTML=
    (results.length?`<div class="shift-result">✓ ${results.map(r=>r.name).join('、')} を読み込みました</div>`:'')+
    (errors.length?`<div class="shift-error">読み取れなかった行: ${errors.join('、')}</div>`:'');
  save();renderShop(currentShop);
  setTimeout(()=>closeModal('modalShiftImport'),1200);
}

function getBaseSchedule(c){
  const sm=toMins(c.start);
  const base=c.type;
  return{
    firstStart:c.firstStart||c.start,
    firstEnd:c.firstEnd||toTime(sm+base/2),
    secondStart:c.secondStart||toTime(sm+base/2),
    secondEnd:c.secondEnd||toTime(sm+base)
  };
}
function getExtSchedule(prevEnd,extMins,ext){
  const sm=toMins(prevEnd);
  const isHalf=extMins===30;
  const defEnd=toTime(sm+extMins);
  const defChange=isHalf?null:toTime(sm+extMins/2);
  return{
    firstStart:ext.firstStart||prevEnd,
    firstEnd:ext.firstEnd||(isHalf?defEnd:defChange),
    secondStart:ext.secondStart||(isHalf?defEnd:defChange),
    secondEnd:ext.secondEnd||defEnd,
    isHalf
  };
}
function getCourseEndTime(c){
  if(c.extensions&&c.extensions.length>0){
    let prevEnd=getBaseSchedule(c).secondEnd;
    c.extensions.forEach(ext=>{prevEnd=getExtSchedule(prevEnd,ext.mins,ext).secondEnd;});
    return prevEnd;
  }
  return getBaseSchedule(c).secondEnd;
}

function makeCopyText(type,names,time){
  const nameStr=names.join('・')+'さん';
  const mins=getMinPart(time);
  if(type==='change')return`${nameStr}${mins}までに場内交渉お願いします`;
  return`${nameStr}${mins}までに延長交渉お願いします`;
}

function updateMemo(si,ci,field,val){shops[si].courses[ci][field]=val;save();}

function toggleCourse(key){
  courseCollapsed[key]=!courseCollapsed[key];
  renderShop(currentShop);
}
function toggleExt(key){
  extCollapsed[key]=!extCollapsed[key];
  const body=document.getElementById('extbody_'+key);
  const chev=document.getElementById('chev_'+key);
  if(body)body.classList.toggle('collapsed',extCollapsed[key]);
  if(chev)chev.textContent=extCollapsed[key]?'▶':'▼';
}

function toTally(n){
  if(n<=0)return'';
  const full=Math.floor(n/5);
  const rem=n%5;
  const strokes=['一','二','三','四','正'];
  let result='';
  for(let i=0;i<full;i++)result+='正 ';
  if(rem>0)result+=strokes[rem-1];
  return result.trim();
}

function drinkTap(key){drinkCount[key]++;save();renderDrinkPanel();}
function drinkUndo(key){if(drinkCount[key]>0){drinkCount[key]--;save();renderDrinkPanel();}}
function drinkReset(){
  if(!confirm('ドリンクカウントをリセットしますか？'))return;
  drinkCount.s=0;drinkCount.m=0;drinkCount.l=0;drinkCount.jonai=0;
  save();renderDrinkPanel();
}

function renderDrinkPanel(){
  const items=[
    {key:'s',back:'400',price:'1,500円'},
    {key:'m',back:'500',price:'2,000円'},
    {key:'l',back:'1,500',price:'5,000円'},
    {key:'jonai',back:'場内',price:''},
  ];
  const backTotal=drinkCount.s*400+drinkCount.m*500+drinkCount.l*1500;
  let html=`<div class="panel active">
    <div class="drink-counter">`;
  items.forEach(item=>{
    const n=drinkCount[item.key]||0;
    html+=`<div class="drink-item">
      <div class="drink-item-back">${item.back}</div>
      ${item.price?`<div class="drink-item-price">${item.price}</div>`:'<div class="drink-item-price">&nbsp;</div>'}
      <div class="drink-tally">${toTally(n)||'&nbsp;'}</div>
      <div class="drink-count-num">${n}本</div>
      <button class="drink-tap-btn" onclick="drinkTap('${item.key}')">＋</button>
      <button class="drink-undo-btn" onclick="drinkUndo('${item.key}')">取消</button>
    </div>`;
  });
  html+=`</div>
    <div class="drink-total-row">
      <div class="drink-total-item">400: <span>${drinkCount.s}</span></div>
      <div class="drink-total-item">500: <span>${drinkCount.m}</span></div>
      <div class="drink-total-item">1500: <span>${drinkCount.l}</span></div>
      <div class="drink-total-item">場内: <span>${drinkCount.jonai}</span></div>
      <div class="drink-total-item">バック合計: <span>¥${backTotal.toLocaleString()}</span></div>
      <button class="drink-reset-btn" onclick="drinkReset()">リセット</button>
    </div>
  </div>`;
  const panel=document.getElementById('drinkPanel');
  if(panel)panel.innerHTML=html;
}

function switchShop(i){
  currentShop=i;
  document.querySelectorAll('.shop-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.getElementById('shopPanel0').style.display=i===0?'block':'none';
  document.getElementById('shopPanel1').style.display=i===1?'block':'none';
  renderShop(i);
}
function switchInnerTab(si,tab){shops[si].innerTab=tab;save();renderShop(si);}
function toggleShowDone(si){shops[si].showDone=!shops[si].showDone;save();renderShop(si);}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

function confirmAddStaff(){
  const name=document.getElementById('inputStaffName').value.trim();
  if(!name)return;
  shops[currentShop].staff.push({name,working:false,shiftStart:null,shiftEnd:null});
  save();renderShop(currentShop);closeModal('modalAddStaff');
}
function toggleWorking(si,idx){
  const s=shops[si].staff[idx];
  s.working=!s.working;
  if(s.working&&!s.shiftStart)s.shiftStart=nowStr();
  save();renderShop(si);
}
function deleteStaff(si,idx){shops[si].staff.splice(idx,1);save();renderShop(si);}

function openAddCourse(){document.getElementById('inputCourseStart').value=nowStr();openModal('modalAddCourse');}
function confirmAddCourse(){
  const type=parseInt(document.getElementById('inputCourseType').value);
  const start=document.getElementById('inputCourseStart').value;
  if(!start)return;
  shops[currentShop].courses.push({type,start,firstHalf:[],secondHalf:[],done:false,firstStart:null,firstEnd:null,secondStart:null,secondEnd:null,extensions:[],memo1:'',memo2:''});
  save();renderShop(currentShop);closeModal('modalAddCourse');
}
function deleteCourse(si,ci){shops[si].courses.splice(ci,1);save();renderShop(si);}
function markDone(si,ci){shops[si].courses[ci].done=!shops[si].courses[ci].done;save();renderShop(si);}

function openAssign(si,ci,half,extIdx){
  pendingShop=si;pendingCourseIdx=ci;pendingHalf=half;pendingExtBlock=extIdx!=null?extIdx:null;
  const shop=shops[si],course=shop.courses[ci];
  const working=shop.staff.filter(s=>s.working);
  let already=[];
  if(extIdx!=null){const ext=course.extensions[extIdx];already=half==='first'?(ext.firstHalf||[]):(ext.secondHalf||[]);}
  else{already=half==='first'?course.firstHalf:course.secondHalf;}
  document.getElementById('modalAssignTitle').textContent=half==='first'?'前半 — 女の子をアサイン':'後半 — 女の子をアサイン';
  document.getElementById('girlCheckList').innerHTML=working.length===0
    ?'<div style="color:#aaa;font-size:13px">出勤中のスタッフがいません</div>'
    :working.map(s=>`<label class="girl-check-item"><input type="checkbox" value="${s.name}" ${already.includes(s.name)?'checked':''}> ${s.name}</label>`).join('');
  openModal('modalAssign');
}
function confirmAssign(){
  const checked=[...document.querySelectorAll('#girlCheckList input:checked')].map(i=>i.value);
  const course=shops[pendingShop].courses[pendingCourseIdx];
  if(pendingExtBlock!=null){const ext=course.extensions[pendingExtBlock];if(pendingHalf==='first')ext.firstHalf=checked;else ext.secondHalf=checked;}
  else{if(pendingHalf==='first')course.firstHalf=checked;else course.secondHalf=checked;}
  save();renderShop(pendingShop);closeModal('modalAssign');
}
function removeGirl(si,ci,half,name,extIdx){
  const c=shops[si].courses[ci];
  if(extIdx!=null){const ext=c.extensions[extIdx];if(half==='first')ext.firstHalf=(ext.firstHalf||[]).filter(n=>n!==name);else ext.secondHalf=(ext.secondHalf||[]).filter(n=>n!==name);}
  else{if(half==='first')c.firstHalf=c.firstHalf.filter(n=>n!==name);else c.secondHalf=c.secondHalf.filter(n=>n!==name);}
  save();renderShop(si);
}
function jonaiBtnClick(si,ci,extIdx){
  const course=shops[si].courses[ci];
  if(extIdx!=null){
    const ext=course.extensions[extIdx];
    if((ext.firstHalf||[]).length===0){alert('前半に女の子がいません');return;}
    if((ext.secondHalf||[]).length>0){if(!confirm('後半に既にアサインがあります。前半の子で上書きしますか？'))return;}
    else{if(!confirm('場内にします。前半の子をそのまま後半にセットします。'))return;}
    ext.secondHalf=[...ext.firstHalf];
  }else{
    if(course.firstHalf.length===0){alert('前半に女の子がいません');return;}
    if(course.secondHalf.length>0){if(!confirm('後半に既にアサインがあります。前半の子で上書きしますか？'))return;}
    else{if(!confirm('場内にします。前半の子をそのまま後半にセットします。'))return;}
    course.secondHalf=[...course.firstHalf];
  }
  save();renderShop(si);
}
function openExtend(si,ci){
  pendingShop=si;pendingExtCourse=ci;
  const c=shops[si].courses[ci];
  let opts=[...shops[si].extOptions];
  if(c.type===60&&si===1&&!opts.includes(30))opts=[30,...opts];
  document.getElementById('inputExtend').innerHTML=opts.map(o=>`<option value="${o}">${o}分延長</option>`).join('');
  openModal('modalExtend');
}
function confirmExtend(){
  const mins=parseInt(document.getElementById('inputExtend').value);
  const c=shops[pendingShop].courses[pendingExtCourse];
  if(!c.extensions)c.extensions=[];
  const prevEnd=getCourseEndTime(c);
  c.extensions.push({mins,firstHalf:[],secondHalf:[],firstStart:null,firstEnd:null,secondStart:null,secondEnd:null,prevEnd});
  save();renderShop(pendingShop);closeModal('modalExtend');
}
function deleteExtension(si,ci,ei){shops[si].courses[ci].extensions.splice(ei);save();renderShop(si);}
function openEditTime(si,ci){
  pendingShop=si;pendingEditCourse=ci;
  const sc=getBaseSchedule(shops[si].courses[ci]);
  document.getElementById('inputFirstStart').value=sc.firstStart;
  document.getElementById('inputFirstEnd').value=sc.firstEnd;
  document.getElementById('inputSecondStart').value=sc.secondStart;
  document.getElementById('inputSecondEnd').value=sc.secondEnd;
  document.getElementById('linkHalves').checked=false;
  openModal('modalEditTime');
}
document.getElementById('inputFirstEnd').addEventListener('change',function(){
  if(document.getElementById('linkHalves').checked)document.getElementById('inputSecondStart').value=this.value;
});
document.getElementById('linkHalves').addEventListener('change',function(){
  if(this.checked)document.getElementById('inputSecondStart').value=document.getElementById('inputFirstEnd').value;
});
function confirmEditTime(){
  const c=shops[pendingShop].courses[pendingEditCourse];
  c.firstStart=document.getElementById('inputFirstStart').value;
  c.firstEnd=document.getElementById('inputFirstEnd').value;
  c.secondStart=document.getElementById('inputSecondStart').value;
  c.secondEnd=document.getElementById('inputSecondEnd').value;
  save();renderShop(pendingShop);closeModal('modalEditTime');
}

function renderTimeline(sc,baseType,firstNames,secondNames,btnPrefix,isExt,extMins){
  const effectiveType=isExt?extMins:baseType;
  const isHalf=effectiveType===30;
  let changeTime=null,extNegTime;
  if(isHalf){extNegTime=toTime(toMins(sc.secondEnd)-10);}
  else if(effectiveType===40||effectiveType===20){changeTime=sc.firstEnd;extNegTime=toTime(toMins(sc.secondEnd)-5);}
  else{changeTime=toTime(toMins(sc.firstEnd)-5);extNegTime=toTime(toMins(sc.secondEnd)-10);}
  let html='<div class="timeline">';
  if(changeTime){
    const changeCopy=firstNames&&firstNames.length>0?makeCopyText('change',firstNames,changeTime):'';
    const bid=`${btnPrefix}_change`;
    html+=`<span class="tl-item ${tlClass(changeTime)}">場内/チェンジ ${changeTime}</span>`;
    if(changeCopy)html+=`<button class="copy-btn" id="${bid}" onclick="showCopyModal(${JSON.stringify(changeCopy)})">コピー</button>`;
  }
  const extCopy=secondNames&&secondNames.length>0?makeCopyText('extend',secondNames,extNegTime):'';
  const ebid=`${btnPrefix}_ext`;
  html+=`<span class="tl-item ${tlClass(extNegTime)}">延長交渉 ${extNegTime}</span>`;
  if(extCopy)html+=`<button class="copy-btn" id="${ebid}" onclick="showCopyModal(${JSON.stringify(extCopy)})">コピー</button>`;
  html+=`<span class="tl-item ${tlClass(sc.secondEnd)}">終了 ${sc.secondEnd}</span>`;
  html+='</div>';
  return html;
}

function renderHalfBlock(si,ci,sc,firstHalf,secondHalf,extIdx,isHalf){
  const ei=extIdx!=null?extIdx:-1;
  const eStr=ei>=0?`,${ei}`:'';
  if(isHalf){
    return`<div class="half-block single"><div class="half ext-half">
      <div class="half-label">延長枠</div>
      <div class="half-time">${sc.firstStart} 〜 ${sc.secondEnd}</div>
      <div class="half-girls">${(firstHalf||[]).map(n=>`<span class="girl-chip">${n}<span class="remove" onclick="removeGirl(${si},${ci},'first','${n}'${eStr})">✕</span></span>`).join('')}
      <button class="btn" style="font-size:10px;padding:1px 6px" onclick="openAssign(${si},${ci},'first'${eStr})">＋</button></div>
    </div></div>`;
  }
  return`<div class="half-block">
    <div class="half${ei>=0?' ext-half':''}">
      <div class="half-label">前半</div>
      <div class="half-time">${sc.firstStart} 〜 ${sc.firstEnd}</div>
      <div class="half-girls">${(firstHalf||[]).map(n=>`<span class="girl-chip">${n}<span class="remove" onclick="removeGirl(${si},${ci},'first','${n}'${eStr})">✕</span></span>`).join('')}
      <button class="btn" style="font-size:10px;padding:1px 6px" onclick="openAssign(${si},${ci},'first'${eStr})">＋</button></div>
    </div>
    <div class="half${ei>=0?' ext-half':''}">
      <div class="half-label">後半</div>
      <div class="half-time">${sc.secondStart} 〜 ${sc.secondEnd}</div>
      <div class="half-girls">${(secondHalf||[]).map(n=>`<span class="girl-chip">${n}<span class="remove" onclick="removeGirl(${si},${ci},'second','${n}'${eStr})">✕</span></span>`).join('')}
      <button class="btn" style="font-size:10px;padding:1px 6px" onclick="openAssign(${si},${ci},'second'${eStr})">＋</button></div>
    </div>
  </div>`;
}

function renderShop(idx){
  const shop=shops[idx];
  const tab=shop.innerTab||0;
  let html=`<div class="inner-tabs">
    <button class="inner-tab${tab===0?' active':''}" onclick="switchInnerTab(${idx},0)">スタッフ</button>
    <button class="inner-tab${tab===1?' active':''}" onclick="switchInnerTab(${idx},1)">コース</button>
    <button class="inner-tab${tab===2?' active':''}" onclick="switchInnerTab(${idx},2)">状況一覧</button>
    <button class="inner-tab${tab===3?' active':''}" onclick="switchInnerTab(${idx},3)">ドリンク</button>
  </div>`;
  if(tab===0)html+=renderStaffTab(idx);
  else if(tab===1)html+=renderCourseTab(idx);
  else if(tab===2)html+=renderStatusTab(idx);
  else html+=`<div id="drinkPanel"></div>`;
  document.getElementById('shopPanel'+idx).innerHTML=html;
  if(tab===3)renderDrinkPanel();
}

function renderStaffTab(idx){
  const shop=shops[idx];
  const sorted=sortedStaff(shop.staff);
  const working=sorted.filter(s=>s.working).length;
  let html=`<div class="panel active"><div class="section-head">
    <span style="font-size:12px;color:#666">出勤中 ${working}人 / 全${shop.staff.length}人</span>
    <div style="display:flex;gap:6px">
      <button class="btn info" onclick="document.getElementById('inputShiftText').value='';document.getElementById('shiftResult').innerHTML='';openModal('modalShiftImport')">シフト読み込み</button>
      <button class="btn primary" onclick="document.getElementById('inputStaffName').value='';openModal('modalAddStaff')">＋ 追加</button>
    </div>
  </div>`;
  if(shop.staff.length===0){html+=`<div class="empty">スタッフを登録するか、シフトを読み込んでください</div>`;}
  else{
    html+='<div class="grid">';
    sorted.forEach(s=>{
      const si=shop.staff.indexOf(s);
      html+=`<div class="card${s.working?' active-staff':''}">
        <button onclick="deleteStaff(${idx},${si})" style="position:absolute;top:5px;right:5px;border:none;background:transparent;cursor:pointer;color:#bbb;font-size:11px">✕</button>
        <div class="card-name" style="margin-bottom:4px">${s.name}</div>
        ${s.shiftStart?`<div style="font-size:11px;color:#185fa5;margin-bottom:4px">${s.shiftStart}${s.shiftEnd?' 〜 '+s.shiftEnd:''}</div>`:''}
        <span class="badge ${s.working?'free':'off'}">${s.working?'出勤中':'休み'}</span><br>
        <button class="btn" style="margin-top:7px;font-size:11px;width:100%" onclick="toggleWorking(${idx},${si})">${s.working?'退勤':'出勤'}</button>
      </div>`;
    });
    html+='</div>';
  }
  return html+'</div>';
}

function renderCourseTab(idx){
  const shop=shops[idx];
  const active=shop.courses.filter(c=>!c.done);
  const done=shop.courses.filter(c=>c.done);
  const showDone=shop.showDone||false;
  let html=`<div class="panel active"><div class="section-head">
    <span style="font-size:12px;color:#666">進行中 ${active.length}本</span>
    <div style="display:flex;gap:6px;align-items:center">
      ${done.length>0?`<button class="toggle-done-btn${showDone?' active':''}" onclick="toggleShowDone(${idx})">${showDone?'終了済みを隠す':'終了済みを表示'}(${done.length})</button>`:''}
      <button class="btn primary" onclick="openAddCourse()">＋ コース追加</button>
    </div>
  </div>`;
  if(shop.courses.length===0){html+=`<div class="empty">コースを追加してください</div>`;}
  else{
    const visible=showDone?shop.courses:shop.courses.filter(c=>!c.done);
    visible.forEach(c=>{
      const ci=shop.courses.indexOf(c);
      const sc=getBaseSchedule(c);
      const totalEnd=getCourseEndTime(c);
      const extCount=c.extensions?c.extensions.length:0;
      const ckey=`${idx}_${ci}`;
      const collapsed=courseCollapsed[ckey]||false;
      const allGirls=[...new Set([...c.firstHalf,...c.secondHalf,...(c.extensions||[]).flatMap(e=>[...(e.firstHalf||[]),...(e.secondHalf||[])])])];

      html+=`<div class="course-card${c.done?' done-card':''}">
        <div class="course-head" onclick="toggleCourse('${ckey}')">
          <span class="course-num">#${ci+1}</span>
          <span style="background:#f0f0f0;border-radius:20px;padding:2px 9px;font-size:11px">${c.type}分${extCount>0?` +延長×${extCount}`:''}</span>
          <span style="font-size:12px;color:#666">${sc.firstStart} → ${totalEnd}</span>
          <span style="margin-left:auto;font-size:11px;color:#888">${collapsed?'▶':'▼'}</span>
        </div>
        ${collapsed?`
        <div class="summary-chips">
          ${allGirls.map(n=>`<span class="summary-chip">${n}</span>`).join('')}
          ${c.memo1?`<span class="summary-chip memo">${c.memo1}</span>`:''}
          ${c.memo2?`<span class="summary-chip memo">${c.memo2}</span>`:''}
        </div>
        <div class="compact-btns">
          <button class="btn" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();openEditTime(${idx},${ci})">時間編集</button>
          <button class="btn info" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();jonaiBtnClick(${idx},${ci})">場内</button>
          <button class="btn warn" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();openExtend(${idx},${ci})">延長</button>
          <button class="btn danger" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();markDone(${idx},${ci})">${c.done?'復元':'終了'}</button>
          <button class="btn" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();deleteCourse(${idx},${ci})">削除</button>
        </div>
        `:`
        <div class="compact-btns">
          <button class="btn" style="font-size:11px;padding:2px 7px" onclick="openEditTime(${idx},${ci})">時間編集</button>
          <button class="btn info" style="font-size:11px;padding:2px 7px" onclick="jonaiBtnClick(${idx},${ci})">場内</button>
          <button class="btn warn" style="font-size:11px;padding:2px 7px" onclick="openExtend(${idx},${ci})">延長</button>
          <button class="btn danger" style="font-size:11px;padding:2px 7px" onclick="markDone(${idx},${ci})">${c.done?'復元':'終了'}</button>
          <button class="btn" style="font-size:11px;padding:2px 7px" onclick="deleteCourse(${idx},${ci})">削除</button>
        </div>
        <div class="memo-row">
          <input class="memo-input" type="text" placeholder="メモ1" value="${c.memo1||''}" oninput="updateMemo(${idx},${ci},'memo1',this.value)" />
          <input class="memo-input" type="text" placeholder="メモ2" value="${c.memo2||''}" oninput="updateMemo(${idx},${ci},'memo2',this.value)" />
        </div>
        ${renderHalfBlock(idx,ci,sc,c.firstHalf,c.secondHalf,null,false)}
        ${renderTimeline(sc,c.type,c.firstHalf,c.secondHalf,`tl_${idx}_${ci}_base`,false,null)}
        ${(c.extensions||[]).map((ext,ei)=>{
          let prevEnd=sc.secondEnd;
          for(let i=0;i<ei;i++){prevEnd=getExtSchedule(prevEnd,c.extensions[i].mins,c.extensions[i]).secondEnd;}
          const esc=getExtSchedule(prevEnd,ext.mins,ext);
          const key=`${idx}_${ci}_${ei}`;
          const ecollapsed=extCollapsed[key]||false;
          return`<div class="ext-block">
            <div class="ext-block-label" onclick="toggleExt('${key}')">
              <span>延長${ei+1} (${ext.mins}分) ${esc.firstStart}→${esc.secondEnd}</span>
              ${!esc.isHalf?`<button class="btn info" style="font-size:10px;padding:1px 6px" onclick="event.stopPropagation();jonaiBtnClick(${idx},${ci},${ei})">場内</button>`:''}
              <button class="btn danger" style="font-size:10px;padding:1px 6px" onclick="event.stopPropagation();deleteExtension(${idx},${ci},${ei})">削除</button>
              <span class="chevron" id="chev_${key}">${ecollapsed?'▶':'▼'}</span>
            </div>
            <div class="ext-block-body${ecollapsed?' collapsed':''}" id="extbody_${key}">
              ${renderHalfBlock(idx,ci,esc,ext.firstHalf,ext.secondHalf,ei,esc.isHalf)}
              ${renderTimeline(esc,c.type,ext.firstHalf,ext.secondHalf,`tl_${idx}_${ci}_ext${ei}`,true,ext.mins)}
            </div>
          </div>`;
        }).join('')}
        `}
      </div>`;
    });
  }
  return html+'</div>';
}

function renderStatusTab(idx){
  const shop=shops[idx];
  const sorted=sortedStaff(shop.staff.filter(s=>s.working));
  let html=`<div class="panel active">`;
  if(sorted.length===0){html+=`<div class="empty">出勤中のスタッフがいません</div>`;}
  else{
    html+=`<table class="status-table"><thead><tr>
      <th>名前</th><th>本数</th><th>状況</th><th>コース</th><th>時間</th>
    </tr></thead><tbody>`;
    sorted.forEach(s=>{
      const ac=shop.courses.filter(c=>!c.done&&(
        c.firstHalf.includes(s.name)||c.secondHalf.includes(s.name)||
        (c.extensions||[]).some(e=>(e.firstHalf||[]).includes(s.name)||(e.secondHalf||[]).includes(s.name))
      ));
      const total=shop.courses.filter(c=>
        c.firstHalf.includes(s.name)||c.secondHalf.includes(s.name)||
        (c.extensions||[]).some(e=>(e.firstHalf||[]).includes(s.name)||(e.secondHalf||[]).includes(s.name))
      ).length;
      const overlap=ac.length>1;
      const overlapBadge=overlap?`<span class="overlap-badge">⚠ 重複</span>`:'';
      const countBadge=`<span class="count-badge">${total}本</span>`;
      if(ac.length===0){
        html+=`<tr><td><span class="dot free"></span>${s.name}${overlapBadge}</td><td>${countBadge}</td><td><span class="badge free">空き</span></td><td>—</td><td>—</td></tr>`;
      }else{
        ac.forEach((c,i)=>{
          const ci=shop.courses.indexOf(c);
          const sc=getBaseSchedule(c);
          const inFirst=c.firstHalf.includes(s.name);
          const inSecond=c.secondHalf.includes(s.name);
          const inBase=inFirst||inSecond;
          const half=inBase?(inFirst&&inSecond?'前半/後半':inFirst?'前半':'後半'):'延長';
          const start=inFirst?sc.firstStart:sc.secondStart;
          const end=inSecond?sc.secondEnd:inFirst?sc.firstEnd:getCourseEndTime(c);
          const lc=tlClass(end);
          html+=`<tr>
            <td>${i===0?`<span class="dot busy"></span>${s.name}${overlapBadge}`:''}</td>
            <td>${i===0?countBadge:''}</td>
            <td><span class="badge busy">${half}</span></td>
            <td>#${ci+1} ${c.type}分</td>
            <td style="font-size:12px;${lc==='done'?'color:#a32d2d;font-weight:500':lc==='soon'?'color:#ba7517;font-weight:500':''}">
              ${start} 〜 ${end}
            </td>
          </tr>`;
        });
      }
    });
    html+=`</tbody></table>`;
  }
  return html+'</div>';
}

document.getElementById('inputStaffName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAddStaff()});
load();
renderShop(0);
renderShop(1);
setInterval(()=>renderShop(currentShop),30000);
