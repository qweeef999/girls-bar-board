<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集計表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:12px;background:#fff;color:#222;padding:8px}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.top-bar input,.top-bar select{font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:6px}
.btn{padding:4px 12px;font-size:12px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;color:#222}
.btn:hover{background:#f0f0f0}
.btn.primary{background:#e1f5ee;color:#0f6e56;border-color:#5dcaa5}
.btn.danger{background:#ffeaea;color:#a32d2d;border-color:#f09595}
.section{margin-bottom:14px}
.section-title{font-size:12px;font-weight:600;color:#444;margin-bottom:4px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f0f0f0;padding:4px 3px;border:1px solid #ccc;text-align:center;font-weight:500;white-space:nowrap}
td{padding:2px 3px;border:1px solid #ddd;text-align:center;vertical-align:middle}
td input[type=text],td input[type=number],td input[type=time]{width:100%;font-size:11px;padding:2px 3px;border:none;background:transparent;text-align:center;color:#222;min-width:0}
td input[type=text]{text-align:left}
td input:focus{outline:1px solid #5dcaa5;border-radius:2px;background:#f0fff8}
td select{font-size:11px;padding:1px 2px;border:1px solid #ddd;border-radius:3px;width:100%}
.total-row td{background:#f5f5f5;font-weight:500}
.nichipai{display:inline-block;padding:1px 5px;border-radius:8px;font-size:10px;background:#faeeda;color:#854f0b;border:1px solid #ef9f27;cursor:pointer;user-select:none}
.nichipai.paid{background:#e1f5ee;color:#0f6e56;border-color:#5dcaa5}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.summary-box{background:#f9f9f9;border:1px solid #ddd;border-radius:6px;padding:8px}
.summary-box-title{font-size:11px;font-weight:600;color:#666;margin-bottom:6px}
.sum-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #eee;font-size:12px}
.sum-row:last-child{border-bottom:none}
.sum-label{color:#666}
.sum-val{font-weight:500}
.sum-val.green{color:#0f6e56;font-weight:600}
.expense-input{width:90px;font-size:12px;padding:2px 5px;border:1px solid #ddd;border-radius:4px;text-align:right}
.back-btn{font-size:11px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;color:#666;text-decoration:none;display:inline-block}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← ボード</a>
  <input type="date" id="inputDate" />
  <select id="inputShop">
    <option value="ANUBIS">ANUBIS</option>
    <option value="BASTET">BASTET</option>
  </select>
  <button class="btn primary" onclick="save()">保存</button>
  <button class="btn" onclick="clearAll()">クリア</button>
</div>

<!-- スタッフ表 -->
<div class="section">
  <div class="section-title">
    スタッフ
    <button class="btn primary" style="font-size:11px;padding:2px 8px" onclick="addStaffRow()">＋ 追加</button>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th style="width:20px"></th>
          <th style="min-width:60px">名前</th>
          <th style="width:50px">出勤</th>
          <th style="width:50px">退勤</th>
          <th style="width:36px">実働</th>
          <th style="width:28px">S</th>
          <th style="width:28px">M</th>
          <th style="width:28px">L</th>
          <th style="width:28px">指名</th>
          <th style="width:30px">日払</th>
          <th style="width:20px"></th>
        </tr>
      </thead>
      <tbody id="staffBody"></tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="5" style="text-align:right;color:#888;font-size:10px">合計</td>
          <td id="totS">0</td>
          <td id="totM">0</td>
          <td id="totL">0</td>
          <td id="totShimei">0</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<!-- お客さん表 -->
<div class="section">
  <div class="section-title">
    お客さん
    <button class="btn primary" style="font-size:11px;padding:2px 8px" onclick="addCustomerRow()">＋ 追加</button>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th style="width:20px">No</th>
          <th style="width:36px">伝票</th>
          <th style="width:28px">人数</th>
          <th style="width:50px">入店</th>
          <th style="width:50px">退店</th>
          <th style="min-width:60px">備考</th>
          <th style="width:65px">売上</th>
          <th style="width:44px">支払</th>
          <th style="width:20px"></th>
        </tr>
      </thead>
      <tbody id="customerBody"></tbody>
      <tfoot>
        <tr class="total-row">
          <td colspan="6" style="text-align:right;color:#888;font-size:10px">合計</td>
          <td id="totSales">¥0</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<!-- 集計 -->
<div class="section">
  <div class="section-title">集計</div>
  <div class="summary-grid">
    <div class="summary-box">
      <div class="summary-box-title">ドリンク</div>
      <div class="sum-row"><span class="sum-label">S (¥1,500)</span><span class="sum-val" id="sumS">0本</span></div>
      <div class="sum-row"><span class="sum-label">M (¥2,000)</span><span class="sum-val" id="sumM">0本</span></div>
      <div class="sum-row"><span class="sum-label">L (¥5,000)</span><span class="sum-val" id="sumL">0本</span></div>
      <div class="sum-row"><span class="sum-label">指名</span><span class="sum-val" id="sumShimei">0回</span></div>
    </div>
    <div class="summary-box">
      <div class="summary-box-title">売上</div>
      <div class="sum-row"><span class="sum-label">総売上</span><span class="sum-val green" id="sumTotal">¥0</span></div>
      <div class="sum-row"><span class="sum-label">現金</span><span class="sum-val" id="sumCash">¥0</span></div>
      <div class="sum-row"><span class="sum-label">カード</span><span class="sum-val" id="sumCard">¥0</span></div>
    </div>
    <div class="summary-box">
      <div class="summary-box-title">経費・粗利</div>
      <div class="sum-row"><span class="sum-label">経費</span><input class="expense-input" type="number" id="inputExpense" placeholder="0" oninput="updateSummary();save()"></div>
      <div class="sum-row"><span class="sum-label">粗利</span><span class="sum-val green" id="sumProfit">¥0</span></div>
      <div class="sum-row"><span class="sum-label">現金粗利</span><span class="sum-val" id="sumProfitCash">¥0</span></div>
      <div class="sum-row"><span class="sum-label">カード粗利</span><span class="sum-val" id="sumProfitCard">¥0</span></div>
    </div>
    <div class="summary-box">
      <div class="summary-box-title">スタッフ別</div>
      <div id="staffDetail"></div>
    </div>
  </div>
</div>

<script>
let staffRows=[],customerRows=[];

function pad(n){return String(n).padStart(2,'0')}
function calcH(i,o){
  if(!i||!o)return'—';
  const a=i.split(':').map(Number),b=o.split(':').map(Number);
  let m=(b[0]*60+b[1])-(a[0]*60+a[1]);
  if(m<0)m+=1440;
  return(m/60).toFixed(1)+'h';
}

function addStaffRow(d){
  staffRows.push({id:Date.now()+Math.random(),name:'',in:'',out:'',s:0,m:0,l:0,shimei:0,nichipai:false,...(d||{})});
  renderStaff();
}
function removeStaffRow(id){staffRows=staffRows.filter(r=>r.id!==id);renderStaff();}
function updateStaff(id,f,v){
  const r=staffRows.find(r=>r.id===id);
  if(r){r[f]=f==='s'||f==='m'||f==='l'||f==='shimei'?+v:v;}
  if(f==='in'||f==='out')renderStaff();
  updateSummary();save();
}
function toggleNichipai(id){
  const r=staffRows.find(r=>r.id===id);
  if(r){r.nichipai=!r.nichipai;renderStaff();save();}
}
function renderStaff(){
  document.getElementById('staffBody').innerHTML=staffRows.map((r,i)=>`<tr>
    <td>${i+1}</td>
    <td><input type="text" value="${r.name}" onchange="updateStaff(${r.id},'name',this.value)" placeholder="名前"></td>
    <td><input type="time" value="${r.in||''}" onchange="updateStaff(${r.id},'in',this.value)"></td>
    <td><input type="time" value="${r.out||''}" onchange="updateStaff(${r.id},'out',this.value)"></td>
    <td style="font-size:10px">${calcH(r.in,r.out)}</td>
    <td><input type="number" min="0" value="${r.s||0}" onchange="updateStaff(${r.id},'s',this.value)"></td>
    <td><input type="number" min="0" value="${r.m||0}" onchange="updateStaff(${r.id},'m',this.value)"></td>
    <td><input type="number" min="0" value="${r.l||0}" onchange="updateStaff(${r.id},'l',this.value)"></td>
    <td><input type="number" min="0" value="${r.shimei||0}" onchange="updateStaff(${r.id},'shimei',this.value)"></td>
    <td><span class="nichipai${r.nichipai?' paid':''}" onclick="toggleNichipai(${r.id})">${r.nichipai?'済':'未'}</span></td>
    <td><button class="btn danger" style="font-size:9px;padding:1px 4px" onclick="removeStaffRow(${r.id})">✕</button></td>
  </tr>`).join('');
  document.getElementById('totS').textContent=staffRows.reduce((a,r)=>a+(+r.s||0),0);
  document.getElementById('totM').textContent=staffRows.reduce((a,r)=>a+(+r.m||0),0);
  document.getElementById('totL').textContent=staffRows.reduce((a,r)=>a+(+r.l||0),0);
  document.getElementById('totShimei').textContent=staffRows.reduce((a,r)=>a+(+r.shimei||0),0);
  updateSummary();
}

function addCustomerRow(d){
  customerRows.push({id:Date.now()+Math.random(),no:'',ninzu:1,in:'',out:'',memo:'',sales:0,payment:'現金',...(d||{})});
  renderCustomer();
}
function removeCustomerRow(id){customerRows=customerRows.filter(r=>r.id!==id);renderCustomer();}
function updateCustomer(id,f,v){
  const r=customerRows.find(r=>r.id===id);
  if(r){r[f]=f==='ninzu'||f==='sales'?+v:v;}
  updateSummary();save();
}
function renderCustomer(){
  document.getElementById('customerBody').innerHTML=customerRows.map((r,i)=>`<tr>
    <td>${i+1}</td>
    <td><input type="text" value="${r.no||''}" onchange="updateCustomer(${r.id},'no',this.value)"></td>
    <td><input type="number" min="1" value="${r.ninzu||1}" onchange="updateCustomer(${r.id},'ninzu',this.value)"></td>
    <td><input type="time" value="${r.in||''}" onchange="updateCustomer(${r.id},'in',this.value)"></td>
    <td><input type="time" value="${r.out||''}" onchange="updateCustomer(${r.id},'out',this.value)"></td>
    <td><input type="text" value="${r.memo||''}" onchange="updateCustomer(${r.id},'memo',this.value)" placeholder="備考"></td>
    <td><input type="number" min="0" value="${r.sales||0}" onchange="updateCustomer(${r.id},'sales',this.value)"></td>
    <td><select onchange="updateCustomer(${r.id},'payment',this.value)">
      <option${r.payment==='現金'?' selected':''}>現金</option>
      <option${r.payment==='カード'?' selected':''}>カード</option>
    </select></td>
    <td><button class="btn danger" style="font-size:9px;padding:1px 4px" onclick="removeCustomerRow(${r.id})">✕</button></td>
  </tr>`).join('');
  const tot=customerRows.reduce((a,r)=>a+(+r.sales||0),0);
  document.getElementById('totSales').textContent='¥'+tot.toLocaleString();
  updateSummary();
}

function updateSummary(){
  const s=staffRows.reduce((a,r)=>a+(+r.s||0),0);
  const m=staffRows.reduce((a,r)=>a+(+r.m||0),0);
  const l=staffRows.reduce((a,r)=>a+(+r.l||0),0);
  const shimei=staffRows.reduce((a,r)=>a+(+r.shimei||0),0);
  document.getElementById('sumS').textContent=`${s}本 / ¥${(s*1500).toLocaleString()}`;
  document.getElementById('sumM').textContent=`${m}本 / ¥${(m*2000).toLocaleString()}`;
  document.getElementById('sumL').textContent=`${l}本 / ¥${(l*5000).toLocaleString()}`;
  document.getElementById('sumShimei').textContent=`${shimei}回`;
  const total=customerRows.reduce((a,r)=>a+(+r.sales||0),0);
  const cash=customerRows.filter(r=>r.payment==='現金').reduce((a,r)=>a+(+r.sales||0),0);
  const card=customerRows.filter(r=>r.payment==='カード').reduce((a,r)=>a+(+r.sales||0),0);
  document.getElementById('sumTotal').textContent='¥'+total.toLocaleString();
  document.getElementById('sumCash').textContent='¥'+cash.toLocaleString();
  document.getElementById('sumCard').textContent='¥'+card.toLocaleString();
  const exp=parseInt(document.getElementById('inputExpense').value)||0;
  document.getElementById('sumProfit').textContent='¥'+(total-exp).toLocaleString();
  document.getElementById('sumProfitCash').textContent='¥'+(cash-exp).toLocaleString();
  document.getElementById('sumProfitCard').textContent='¥'+card.toLocaleString();
  document.getElementById('staffDetail').innerHTML=staffRows.filter(r=>r.name).map(r=>`
    <div class="sum-row">
      <span class="sum-label">${r.name}</span>
      <span style="font-size:10px;color:#666">S${r.s||0} M${r.m||0} L${r.l||0} 指${r.shimei||0}</span>
      <span class="sum-val">¥${((+r.s||0)*1500+(+r.m||0)*2000+(+r.l||0)*5000).toLocaleString()}</span>
    </div>`).join('');
}

function save(){
  const date=document.getElementById('inputDate').value;
  const shop=document.getElementById('inputShop').value;
  if(!date)return;
  localStorage.setItem(`sk_${shop}_${date}`,JSON.stringify({staffRows,customerRows,expense:document.getElementById('inputExpense').value||0}));
}
function loadData(){
  const date=document.getElementById('inputDate').value;
  const shop=document.getElementById('inputShop').value;
  if(!date)return;
  try{
    const d=JSON.parse(localStorage.getItem(`sk_${shop}_${date}`));
    if(d){staffRows=d.staffRows||[];customerRows=d.customerRows||[];document.getElementById('inputExpense').value=d.expense||0;}
    else{staffRows=[];customerRows=[];document.getElementById('inputExpense').value=0;}
  }catch(e){staffRows=[];customerRows=[];}
  renderStaff();renderCustomer();
}
function clearAll(){
  if(!confirm('クリアしますか？'))return;
  staffRows=[];customerRows=[];
  document.getElementById('inputExpense').value=0;
  renderStaff();renderCustomer();save();
}

document.getElementById('inputDate').addEventListener('change',loadData);
document.getElementById('inputShop').addEventListener('change',loadData);
const t=new Date();
document.getElementById('inputDate').value=t.toISOString().split('T')[0];
renderStaff();renderCustomer();
</script>
</body>
</html>
